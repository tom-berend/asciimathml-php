    <div id="test"></div>


    <script type='module'>

        import { AMserver } from './asciimath.js';
        let am = new AMserver()

        let d = document.getElementById('test')
        let div
        if (d) {
            div = document.createElement('table')
            d.appendChild(div)

            let tr = document.createElement('tr')
            div.appendChild(tr);

            ['Plaintext', 'ASCIIMathML.js', 'asciimath.ts', 'comment'].map((title) => {
                let th = document.createElement('th')
                th.innerHTML = title
                tr.appendChild(th)
            })
        }

        function appnd(expr, comment) {

            let tr = document.createElement('tr')
            div.appendChild(tr)

            // plaintext of equation
            let td1 = document.createElement('td')
            td1.innerHTML = expr
            tr.appendChild(td1)

            // let asciimathml convert this one live on the page from backticks
            let td2 = document.createElement('td')
            let backtick = String.fromCharCode(0x60)
            td2.innerHTML = backtick + expr + backtick      // don't want AsciiMathML to fire on this line of code
            tr.appendChild(td2)

            // convert this one with s
            let td3 = document.createElement('td')
            let result = am.parseMath(expr)
            td3.innerHTML = result
            tr.appendChild(td3)

            let td4 = document.createElement('td')
            // td4.innerHTML = comment ? comment : ''
            td4.innerHTML = result.replaceAll('<', '&lt;')
            td4.style = 'max-width:300px;'
            tr.appendChild(td4)

        }
