<!DOCTYPE html>
<html>

<!-- a minimal file for running vscode breakpoint debugger -->



<head>
    <title>ASCIIMathML test suite</title>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

    <!-- the original ASCIIMathML.js for testing -->
    <script type="text/javascript" src="lib/ASCIIMathML.js"></script>


    <style type="text/css">
        table {
            font-family: Times;
        }

        table {
            border-collapse: collapse;
        }

        td,
        th {
            border: 1px solid black;
            padding: 5px;
            text-align: center;
        }

        @font-face {
            font-family: "STIX-Two-Math";
            src: url("./lib/STIX2Math.otf") format("opentype");
            font-display: block;

        }

        math {
            font-family: STIX-Two-Math;
            font-size: larger;
        }
    </style>
</head>

<body>

    <div id="test"></div>


    <script type='module'>

        import { AMserver } from './asciimath.js';
        let am = new AMserver()

        let d = document.getElementById('test')
        let div
        if (d) {
            div = document.createElement('table')
            d.appendChild(div)

            let tr = document.createElement('tr')
            div.appendChild(tr);

            ['Plaintext', 'ASCIIMathML.js', 'asciimath.ts', 'comment'].map((title) => {
                let th = document.createElement('th')
                th.innerHTML = title
                tr.appendChild(th)
            })
        }

        function appnd(expr, comment) {

            let tr = document.createElement('tr')
            div.appendChild(tr)

            // plaintext of equation
            let td1 = document.createElement('td')
            td1.innerHTML = expr
            tr.appendChild(td1)

            // let asciimathml convert this one live on the page from backticks
            let td2 = document.createElement('td')
            let backtick = String.fromCharCode(0x60)
            td2.innerHTML = backtick + expr + backtick      // don't want AsciiMathML to fire on this line of code
            tr.appendChild(td2)

            // convert this one with s
            let td3 = document.createElement('td')
            let result = am.parseMath(expr)
            td3.innerHTML = result
            tr.appendChild(td3)

            let td4 = document.createElement('td')
            // td4.innerHTML = comment ? comment : ''
            td4.innerHTML = result.replaceAll('<', '&lt;')
            td4.style = 'max-width:300px;'
            tr.appendChild(td4)

        }

        // put your test expression here
        appnd('[[a,b]]');


    </script>

</body>

</html>
